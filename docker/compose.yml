services:
  mysql:
    image: 'mysql:8.0'
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_ROOT_PASSWORD: verysecret
    ports:
      - '3306:3306'
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - local

  backend:
    build: ../
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - local

  nginx:
    build: ../frontend/
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - local

networks:
  local:
