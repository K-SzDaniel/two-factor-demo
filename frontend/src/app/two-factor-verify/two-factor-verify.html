<div class="two-factor-container">
  <h2>Scan the QR code with</h2>
  <h2>Google Authenticator</h2>
  <qrcode [qrdata]="url" [width]="200" [errorCorrectionLevel]="'M'"></qrcode>
  <div>
    <input class="two-factor-input" #codeInput type="text" placeholder="Enter the code">
    @if (status() === 'success') {
      <div class="notification-success">
        <img width="80" height="80" alt="success" ngSrc="/success.png">
      </div>
    }
    @if (status() === 'failed') {
      <div class="notification-failed">
        <img width="80" height="80" alt="success" ngSrc="/failed.png">
      </div>
    }
  </div>
  <button class="two-factor-button" (click)="submitCode(codeInput.value)">Submit</button>
  <button class="two-factor-button" (click)="changeModal()">Cancel</button>
</div>
